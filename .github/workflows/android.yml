name: Build Flutter Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Recreate Android folder
        run: flutter create --platforms=android --project-name recette_alarm_premium .

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Android Gradle config
        run: |
          python3 <<'PY'
          from pathlib import Path

          candidates = [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]
          p = next((x for x in candidates if x.exists()), None)
          if p is None:
              raise FileNotFoundError('android/app/build.gradle or build.gradle.kts not found after flutter create')
          txt = p.read_text()

          if p.suffix == '.kts':
              txt = txt.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 35')
              txt = txt.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              txt = txt.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 35')
              if 'isCoreLibraryDesugaringEnabled = true' not in txt:
                  txt = txt.replace(
                      'targetCompatibility = JavaVersion.VERSION_1_8',
                      'targetCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true'
                  )
                  txt = txt.replace('sourceCompatibility = JavaVersion.VERSION_1_8', 'sourceCompatibility = JavaVersion.VERSION_17')
              if 'desugar_jdk_libs' not in txt:
                  txt += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
          else:
              txt = txt.replace('compileSdk flutter.compileSdkVersion', 'compileSdk 35')
              txt = txt.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 23')
              txt = txt.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
              if 'coreLibraryDesugaringEnabled true' not in txt:
                  txt = txt.replace(
                      'targetCompatibility JavaVersion.VERSION_1_8',
                      'targetCompatibility JavaVersion.VERSION_17\n        coreLibraryDesugaringEnabled true'
                  )
                  txt = txt.replace('sourceCompatibility JavaVersion.VERSION_1_8', 'sourceCompatibility JavaVersion.VERSION_17')
              if 'desugar_jdk_libs' not in txt:
                  txt += "\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n"
          p.write_text(txt)

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          m = manifest.read_text()
          for perm in [
              '<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>',
              '<uses-permission android:name="android.permission.VIBRATE"/>',
              '<uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT"/>',
          ]:
              if perm not in m:
                  m = m.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + perm)
          manifest.write_text(m)
          PY

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: recette-alarm-premium-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
